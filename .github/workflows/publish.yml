name: Publish

on:
    release:
        types: [published]

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm
        permissions:
            contents: read
            id-token: write # mints the short-lived OIDC token — no NPM_TOKEN in the repo
        steps:
            - uses: actions/checkout@v6.0.2
            - name: Use Node.js 24
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: 24 # ships npm 11.x; OIDC trusted publishing needs >= 11.5.1
                  registry-url: https://registry.npmjs.org
                  cache: npm
            - name: Verify package.json version matches the release tag
              env:
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: |
                  PKG_TAG="v$(node -p "require('./package.json').version")"
                  echo "release tag: $RELEASE_TAG / package.json: $PKG_TAG"
                  if [ "$RELEASE_TAG" != "$PKG_TAG" ]; then
                      echo "::error::tag $RELEASE_TAG does not match package.json ($PKG_TAG)"
                      exit 1
                  fi
            - run: npm ci
            - run: npm run lint
            - run: npm test
            - run: npm publish # OIDC auth + provenance attestation, both automatic
